<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chamber Visualizer</title>
  <script src="./vendor/gif.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --border: #e6e6ea;
      --text: #111318;
      --muted: #5a6375;
      --accent: #7a1f5c;
      --on: #7a1f5c;
      --off: #8d8d94;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
    }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.25rem; }
    .grid-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .grid-layout { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .row { margin-bottom: 0.75rem; }
    .row label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    input[type="range"] { width: 100%; }
    input[type="number"] {
      width: 100%;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    select {
      width: 100%;
      padding: 0.4rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    input[type="color"] {
      width: 100%;
      height: 38px;
      padding: 0.15rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
    }
    .preset-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .preset-btns button {
      font-size: 0.72rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    .preset-btns button:hover { border-color: var(--accent); color: var(--accent); }
    .timeline-wrap { overflow-x: auto; margin-top: 0.5rem; }
    #timeline {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
    }
    .tl-row {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tl-row:last-child { border-bottom: none; }
    .tl-label {
      width: 2rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--muted);
      background: #f7f7fa;
      border-right: 1px solid var(--border);
    }
    .tl-cells { display: flex; }
    .tl-cell {
      width: 22px;
      height: 22px;
      border-right: 1px solid var(--border);
      cursor: pointer;
      background: #f0f1f4;
    }
    .tl-cell:last-child { border-right: none; }
    .tl-cell.on { background: var(--on); }
    .tl-cell:hover { filter: brightness(1.15); }
    .tl-header {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .tl-corner {
      width: 2rem;
      flex-shrink: 0;
      background: #f7f7fa;
      border-right: 1px solid var(--border);
    }
    .tl-step-h {
      width: 22px;
      height: 18px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      font-size: 0.55rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #preview {
      display: block;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
    }
    #preview.transparent-bg {
      background-color: #fff;
      background-image:
        linear-gradient(45deg, #d9d9de 25%, transparent 25%),
        linear-gradient(-45deg, #d9d9de 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d9d9de 75%),
        linear-gradient(-45deg, transparent 75%, #d9d9de 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .actions button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--muted); }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.5rem; }
    .export-status { font-size: 0.8rem; color: var(--muted); min-height: 1.2em; }
    .check-row { display: flex; align-items: center; gap: 0.5rem; }
    .check-row input { width: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Chamber Visualizer</h1>
    <p class="sub">Edit the timeline, tune the look, export an animated GIF.</p>
    <div class="grid-layout">
      <aside class="panel">
        <h2>Layout</h2>
        <div class="row">
          <label>Chambers <span id="chamberVal"></span></label>
          <input type="range" id="chambers" min="4" max="12" value="8" />
        </div>
        <div class="row">
          <label>Time steps <span id="stepVal"></span></label>
          <input type="range" id="steps" min="4" max="32" value="16" />
        </div>
        <h2>Presets</h2>
        <div class="preset-btns">
          <button type="button" data-preset="sequential">Sequential</button>
          <button type="button" data-preset="parallel">Parallel</button>
          <button type="button" data-preset="wave">Wave</button>
          <button type="button" data-preset="alternating">Alternating</button>
          <button type="button" data-preset="center">Center-out</button>
        </div>
        <h2>Pill appearance</h2>
        <div class="row">
          <label>Style</label>
          <select id="stylePreset">
            <option value="balanced" selected>Balanced</option>
            <option value="compact">Compact</option>
            <option value="airy">Airy</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div id="customStyle" style="display:none">
          <div class="row">
            <label>Indicator height</label>
            <input type="range" id="indicatorH" min="0.2" max="0.95" step="0.01" value="0.68" />
          </div>
          <div class="row">
            <label>Indicator thickness</label>
            <input type="range" id="indicatorW" min="0.12" max="0.6" step="0.01" value="0.28" />
          </div>
          <div class="row">
            <label>Spacing</label>
            <input type="range" id="spacing" min="0" max="0.9" step="0.02" value="0.45" />
          </div>
        </div>
        <div class="row">
          <label>Active color</label>
          <input type="color" id="activeColor" value="#7a1f5c" />
        </div>
        <div class="row">
          <label>Inactive color</label>
          <input type="color" id="inactiveColor" value="#8d8d94" />
        </div>
        <div class="row">
          <label>Shape</label>
          <select id="pillShape">
            <option value="pill" selected>Pill</option>
            <option value="round">Round</option>
            <option value="square">Square</option>
            <option value="parallelogram">Parallelogram</option>
          </select>
        </div>
        <div class="row">
          <label>Tilt (deg) <span id="tiltVal"></span></label>
          <input type="range" id="pillTilt" min="-35" max="35" value="0" />
        </div>
        <h2>Animation</h2>
        <div class="row">
          <label>Frame duration (ms)</label>
          <input type="number" id="frameMs" min="40" max="800" step="10" value="500" />
        </div>
        <div class="row check-row">
          <input type="checkbox" id="smooth" checked />
          <label for="smooth" style="margin:0">Smooth transitions</label>
        </div>
        <div class="row" id="easingRow">
          <label>Easing</label>
          <select id="easing">
            <option value="inout" selected>Ease in-out</option>
            <option value="in">Ease in</option>
            <option value="out">Ease out</option>
            <option value="linear">Linear</option>
          </select>
        </div>
        <div class="row">
          <label>Loop mode</label>
          <select id="loopMode">
            <option value="loop">Loop</option>
            <option value="once">Once</option>
            <option value="pingpong">Ping-Pong</option>
          </select>
        </div>
        <h2>Export</h2>
        <div class="row">
          <label>Aspect ratio</label>
          <select id="aspect">
            <option value="1:1">1 / 1</option>
            <option value="3:4">3 / 4</option>
            <option value="4:3" selected>4 / 3</option>
            <option value="16:9">16 / 9</option>
          </select>
        </div>
        <div class="row check-row">
          <input type="checkbox" id="transparent" checked />
          <label for="transparent" style="margin:0">Transparent background</label>
        </div>
        <div class="row" id="bgColorRow" style="display:none">
          <label>Background color</label>
          <input type="color" id="bgColor" value="#ffffff" />
        </div>
        <div class="row">
          <label>GIF padding (px)</label>
          <input type="number" id="gifPad" min="0" max="400" step="1" value="28" />
        </div>
        <div class="row">
          <label>Output width (px)</label>
          <input type="number" id="outW" min="120" max="1200" step="10" value="480" />
        </div>
        <div class="row">
          <label>Output height (auto)</label>
          <input type="number" id="outH" min="80" max="2000" step="1" value="360" disabled />
        </div>
        <div class="row">
          <label>Export quality</label>
          <select id="exportQuality">
            <option value="fast" selected>Fast (recommended)</option>
            <option value="balanced">Balanced</option>
            <option value="high">High</option>
          </select>
          <div class="hint">Higher quality can be slower.</div>
        </div>
        <div class="row">
          <label>Total runtime</label>
          <div id="runtime" class="export-status"></div>
        </div>
        <div class="actions">
          <button type="button" class="btn-primary" id="btnExport">Export GIF</button>
          <button type="button" class="btn-secondary" id="btnClear">Clear timeline</button>
        </div>
        <p class="export-status" id="exportStatus"></p>
      </aside>
      <main class="panel">
        <h2>Preview</h2>
        <canvas id="preview" width="640" height="240"></canvas>
        <p class="hint">Timeline: click a cell to toggle. Click and drag to paint.</p>
        <h2>Timeline</h2>
        <div class="timeline-wrap">
          <div id="timeline"></div>
        </div>
      </main>
    </div>
  </div>
  <script>
(function () {
  const GIF_WORKER = './vendor/gif.worker.js';

  const el = (id) => document.getElementById(id);
  const preview = el('preview');
  const ctx = preview.getContext('2d');

  let nCh = 8;
  let nSteps = 16;
  /** @type {boolean[][]} */
  let grid = [];

  let paintValue = null;
  let painting = false;

  function initGrid() {
    grid = [];
    for (let c = 0; c < nCh; c++) {
      const row = [];
      for (let s = 0; s < nSteps; s++) row.push(false);
      grid.push(row);
    }
  }

  function centerOrder(n) {
    const mid = (n - 1) / 2;
    return Array.from({ length: n }, (_, i) => i).sort(
      (a, b) => Math.abs(a - mid) - Math.abs(b - mid) || a - b
    );
  }

  function applyPreset(name) {
    initGrid();
    if (name === 'sequential') {
      for (let s = 0; s < nSteps; s++) {
        grid[s % nCh][s] = true;
      }
    } else if (name === 'parallel') {
      for (let c = 0; c < nCh; c++) {
        for (let s = 0; s < nSteps; s++) grid[c][s] = true;
      }
    } else if (name === 'wave') {
      const w = Math.max(2, Math.ceil(nCh / 3));
      for (let s = 0; s < nSteps; s++) {
        const start = s % nCh;
        for (let k = 0; k < w; k++) {
          grid[(start + k) % nCh][s] = true;
        }
      }
    } else if (name === 'alternating') {
      for (let s = 0; s < nSteps; s++) {
        const evenPhase = s % 2 === 0;
        for (let c = 0; c < nCh; c++) {
          const isEven = c % 2 === 0;
          grid[c][s] = evenPhase ? isEven : !isEven;
        }
      }
    } else if (name === 'center') {
      const order = centerOrder(nCh);
      for (let s = 0; s < nSteps; s++) {
        const idx = order[s % order.length];
        grid[idx][s] = true;
      }
    }
    renderTimeline();
    drawPreview(0);
  }

  function renderTimeline() {
    const host = el('timeline');
    host.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'tl-header';
    header.appendChild(document.createElement('div')).className = 'tl-corner';
    const cellsH = document.createElement('div');
    cellsH.className = 'tl-cells';
    for (let s = 0; s < nSteps; s++) {
      const h = document.createElement('div');
      h.className = 'tl-step-h';
      h.textContent = s + 1;
      cellsH.appendChild(h);
    }
    header.appendChild(cellsH);
    host.appendChild(header);

    for (let c = 0; c < nCh; c++) {
      const row = document.createElement('div');
      row.className = 'tl-row';
      const lab = document.createElement('div');
      lab.className = 'tl-label';
      lab.textContent = c + 1;
      row.appendChild(lab);
      const cells = document.createElement('div');
      cells.className = 'tl-cells';
      for (let s = 0; s < nSteps; s++) {
        const cell = document.createElement('div');
        cell.className = 'tl-cell' + (grid[c][s] ? ' on' : '');
        cell.dataset.c = String(c);
        cell.dataset.s = String(s);
        cell.addEventListener('mousedown', onCellDown);
        cell.addEventListener('mouseenter', onCellEnter);
        cells.appendChild(cell);
      }
      row.appendChild(cells);
      host.appendChild(row);
    }
  }

  function onCellDown(e) {
    e.preventDefault();
    painting = true;
    const t = e.currentTarget;
    const c = +t.dataset.c;
    const s = +t.dataset.s;
    paintValue = !grid[c][s];
    grid[c][s] = paintValue;
    t.classList.toggle('on', paintValue);
  }

  function onCellEnter(e) {
    if (!painting) return;
    const t = e.currentTarget;
    const c = +t.dataset.c;
    const s = +t.dataset.s;
    grid[c][s] = paintValue;
    t.classList.toggle('on', paintValue);
  }

  document.addEventListener('mouseup', () => {
    painting = false;
    paintValue = null;
  });

  function readAppearance() {
    return {
      activeColor: el('activeColor').value,
      inactiveColor: el('inactiveColor').value,
      bgColor: el('bgColor') ? el('bgColor').value : '#ffffff',
      gifPad: +el('gifPad').value || 0,
      pillShape: el('pillShape') ? el('pillShape').value : 'pill',
      pillTilt: el('pillTilt') ? ((+el('pillTilt').value * Math.PI) / 180) : 0,
      indicatorH: el('indicatorH') ? (+el('indicatorH').value || 0.68) : 0.68,
      indicatorW: el('indicatorW') ? (+el('indicatorW').value || 0.28) : 0.28,
      spacing: el('spacing') ? (+el('spacing').value || 0.55) : 0.55,
      smooth: el('smooth') ? !!el('smooth').checked : true,
      easing: el('easing') ? el('easing').value : 'inout',
    };
  }

  function clamp01(x) { return Math.max(0, Math.min(1, x)); }
  function easeInCubic(t) {
    const x = clamp01(t);
    return x * x * x;
  }
  function easeOutCubic(t) {
    const x = clamp01(t);
    return 1 - Math.pow(1 - x, 3);
  }
  function easeInOutCubic(t) {
    const x = clamp01(t);
    return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
  }
  function applyEasing(mode, t) {
    if (mode === 'linear') return clamp01(t);
    if (mode === 'in') return easeInCubic(t);
    if (mode === 'out') return easeOutCubic(t);
    return easeInOutCubic(t);
  }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function hexToRgb(hex) {
    const h = String(hex || '').replace('#', '').trim();
    if (h.length === 3) {
      const r = parseInt(h[0] + h[0], 16);
      const g = parseInt(h[1] + h[1], 16);
      const b = parseInt(h[2] + h[2], 16);
      return { r, g, b };
    }
    if (h.length !== 6) return { r: 0, g: 0, b: 0 };
    return {
      r: parseInt(h.slice(0, 2), 16),
      g: parseInt(h.slice(2, 4), 16),
      b: parseInt(h.slice(4, 6), 16),
    };
  }
  function rgbToCss({ r, g, b }) {
    const rr = Math.max(0, Math.min(255, Math.round(r)));
    const gg = Math.max(0, Math.min(255, Math.round(g)));
    const bb = Math.max(0, Math.min(255, Math.round(b)));
    return 'rgb(' + rr + ',' + gg + ',' + bb + ')';
  }

  function computeGeometry(w, h, appearance) {
    const { gifPad, spacing, indicatorH, indicatorW } = appearance;
    const pd = Math.max(0, gifPad);

    const innerW = w - 2 * pd;
    const innerH = h - 2 * pd;

    // Keep gaps visually subtle in all scenarios.
    const sp = Math.max(0, Math.min(0.9, spacing));

    // All design knobs are height-based so the look stays consistent across aspect ratios.
    const ih = Math.max(0.2, Math.min(0.95, indicatorH));
    const iw = Math.max(0.12, Math.min(0.6, indicatorW));
    const desiredH = Math.max(6, innerH * ih);
    const desiredW = Math.max(6, desiredH * iw);
    const desiredG = Math.max(0, Math.min(desiredH * sp, desiredW * 0.6));

    const desiredTotal = nCh * desiredW + (nCh - 1) * desiredG;
    const fitScale = desiredTotal > innerW ? (innerW / desiredTotal) : 1;

    const pillH = desiredH * fitScale;
    const pw = desiredW * fitScale;
    const g = desiredG * fitScale;
    const totalW = nCh * pw + (nCh - 1) * g;
    const startX = pd + (innerW - totalW) / 2;
    const y = pd + (innerH - pillH) / 2;

    return { pd, innerW, innerH, pillH, pw, g, totalW, startX, y, fitScale };
  }

  function aspectToWH(value) {
    const parts = String(value).split(':');
    const w = +parts[0];
    const h = +parts[1];
    if (!Number.isFinite(w) || !Number.isFinite(h) || w <= 0 || h <= 0) return { w: 4, h: 3 };
    return { w, h };
  }

  function syncOutputHeight() {
    const outW = +el('outW').value;
    const { w, h } = aspectToWH(el('aspect').value);
    const outH = Math.max(1, Math.round(outW * (h / w)));
    el('outH').value = String(outH);
    return outH;
  }

  function drawFrame(canvasCtx, fromStep, toStep, w, h, transparent, appearance, tBetween = 0) {
    const { activeColor, inactiveColor, bgColor, gifPad, pillShape, pillTilt, smooth, easing } = appearance;
    const pd = Math.max(0, gifPad);
    canvasCtx.clearRect(0, 0, w, h);
    if (!transparent) {
      canvasCtx.fillStyle = bgColor || '#ffffff';
      canvasCtx.fillRect(0, 0, w, h);
    }

    const geo = computeGeometry(w, h, appearance);
    const { pillH, pw, g, startX, y } = geo;

    canvasCtx.save();
    const offScale = 0.35;
    const aRgb = hexToRgb(activeColor || '#7a1f5c');
    const iRgb = hexToRgb(inactiveColor || '#8d8d94');
    const eased = smooth ? applyEasing(easing, tBetween) : 0;
    for (let c = 0; c < nCh; c++) {
      const cur = grid[c][fromStep % nSteps] ? 1 : 0;
      const nxt = grid[c][toStep % nSteps] ? 1 : 0;
      const v = lerp(cur, nxt, eased);
      const x = startX + c * (pw + g);

      const k = offScale + (1 - offScale) * v;
      const baseSize = Math.min(pw, pillH) * k;
      const isSquare = pillShape === 'square';
      const isRound = pillShape === 'round';

      const w2 = (isSquare || isRound) ? baseSize : (pw * k);
      const h2 = (isSquare || isRound) ? baseSize : (pillH * k);
      const x2 = x + (pw - w2) / 2;
      const y2 = y + (pillH - h2) / 2;
      const baseR = Math.min(w2, h2) / 2;
      const r2 =
        pillShape === 'square' ? 0 :
        pillShape === 'round' ? baseR :
        baseR; // pill

      canvasCtx.save();
      if (v > 0.01) {
        canvasCtx.shadowColor = 'rgba(0,0,0,0.18)';
        canvasCtx.shadowBlur = Math.max(6, w2 * 0.22);
        canvasCtx.shadowOffsetX = 0;
        canvasCtx.shadowOffsetY = Math.max(2, h2 * 0.05);
      } else {
        canvasCtx.shadowColor = 'transparent';
        canvasCtx.shadowBlur = 0;
      }

      const cx = x2 + w2 / 2;
      const cy = y2 + h2 / 2;
      if (pillTilt) {
        canvasCtx.translate(cx, cy);
        canvasCtx.rotate(pillTilt);
        canvasCtx.translate(-cx, -cy);
      }

      canvasCtx.beginPath();
      if (pillShape === 'parallelogram') {
        const skew = Math.max(0, Math.min(w2 * 0.35, w2 * 0.22));
        canvasCtx.moveTo(x2 + skew, y2);
        canvasCtx.lineTo(x2 + w2, y2);
        canvasCtx.lineTo(x2 + w2 - skew, y2 + h2);
        canvasCtx.lineTo(x2, y2 + h2);
        canvasCtx.closePath();
      } else {
        canvasCtx.roundRect(x2, y2, w2, h2, r2);
      }
      const col = {
        r: lerp(iRgb.r, aRgb.r, v),
        g: lerp(iRgb.g, aRgb.g, v),
        b: lerp(iRgb.b, aRgb.b, v),
      };
      canvasCtx.fillStyle = rgbToCss(col);
      canvasCtx.globalAlpha = 0.95 + 0.05 * v;
      canvasCtx.fill();

      canvasCtx.restore();
    }

    canvasCtx.restore();
  }

  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      this.moveTo(x + rr, y);
      this.arcTo(x + w, y, x + w, y + h, rr);
      this.arcTo(x + w, y + h, x, y + h, rr);
      this.arcTo(x, y + h, x, y, rr);
      this.arcTo(x, y, x + w, y, rr);
      this.closePath();
    };
  }

  let previewStep = 0;
  let lastT = 0;

  function syncPreviewSize() {
    const outW = +el('outW').value;
    const outH = +el('outH').value;
    if (Number.isFinite(outW) && outW > 0) preview.width = outW;
    if (Number.isFinite(outH) && outH > 0) preview.height = outH;
  }

  function drawPreview(step) {
    const a = readAppearance();
    const transparent = el('transparent').checked;
    preview.classList.toggle('transparent-bg', transparent);
    syncPreviewSize();
    const w = preview.width;
    const h = preview.height;
    drawFrame(ctx, step, step, w, h, transparent, a, 0);
  }

  function tick(ts) {
    const ms = +el('frameMs').value || 120;
    const seq = buildFrameSequence();
    if (seq.length === 0) {
      drawPreview(0);
      requestAnimationFrame(tick);
      return;
    }
    if (!lastT) lastT = ts;
    // Keep a stable phase to avoid boundary flicker.
    while (ts - lastT >= ms) {
      lastT += ms;
      previewStep = (previewStep + 1) % seq.length;
    }
    const t = (ts - lastT) / ms;
    const idx = previewStep % seq.length;
    const step = seq[idx];
    const next = seq[(idx + 1) % seq.length];
    const a = readAppearance();
    const transparent = el('transparent').checked;
    preview.classList.toggle('transparent-bg', transparent);
    syncPreviewSize();
    drawFrame(ctx, step, next, preview.width, preview.height, transparent, a, t);
    requestAnimationFrame(tick);
  }

  function buildFrameSequence() {
    const mode = el('loopMode').value;
    const indices = [];
    for (let s = 0; s < nSteps; s++) indices.push(s);
    if (mode === 'once') return indices;
    if (mode === 'loop') return indices;
    if (mode === 'pingpong') {
      if (nSteps <= 1) return indices;
      const back = [];
      for (let s = nSteps - 2; s >= 1; s--) back.push(s);
      return indices.concat(back);
    }
    return indices;
  }

  function exportGif() {
    const status = el('exportStatus');
    status.textContent = 'Preparing…';
    const outW = +el('outW').value;
    const outH = syncOutputHeight();
    const transparent = el('transparent').checked;
    const frameMs = +el('frameMs').value || 120;
    const seq = buildFrameSequence();
    if (seq.length === 0) {
      status.textContent = 'Add steps to the timeline first.';
      return;
    }
    if (!Number.isFinite(outW) || outW <= 0) {
      status.textContent = 'Invalid output width.';
      return;
    }

    const off = document.createElement('canvas');
    off.width = outW;
    off.height = outH;
    const octx = off.getContext('2d', { willReadFrequently: true });

    const q = (el('exportQuality') && el('exportQuality').value) ? el('exportQuality').value : 'fast';
    const quality = q === 'high' ? 6 : q === 'balanced' ? 10 : 16; // lower = better quality, slower
    const workers = q === 'high' ? 2 : 4;

    const gif = new GIF({
      workers,
      quality,
      width: outW,
      height: outH,
      workerScript: GIF_WORKER,
    });

    const appearance = readAppearance();

    status.textContent = 'Rendering frames… (0/' + seq.length + ')';
    const smooth = appearance.smooth;
    const easingRow = el('easingRow');
    if (easingRow) easingRow.style.display = smooth ? 'block' : 'none';
    const subFrames = smooth ? 4 : 1;
    const subDelay = Math.max(10, Math.round(frameMs / subFrames));
    for (let si = 0; si < seq.length; si++) {
      const from = seq[si];
      const to = seq[(si + 1) % seq.length];
      for (let i = 0; i < subFrames; i++) {
        const t = subFrames === 1 ? 0 : (i / subFrames);
        drawFrame(octx, from, to, outW, outH, transparent, appearance, t);
        gif.addFrame(octx, { copy: true, delay: subDelay });
      }
    }

    const mode = el('loopMode').value;
    gif.setOption('repeat', mode === 'once' ? -1 : 0);

    let lastProgressAt = Date.now();
    const watchdog = window.setInterval(() => {
      if (Date.now() - lastProgressAt < 15000) return;
      window.clearInterval(watchdog);
      try { gif.abort(); } catch (_) {}
      status.textContent = 'Export stalled. Try Fast quality, fewer frames, or run via http://localhost.';
    }, 2000);

    gif.on('finished', function (blob) {
      window.clearInterval(watchdog);
      status.textContent = 'Done.';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'chamber-sequence.gif';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    gif.on('progress', function (p) {
      lastProgressAt = Date.now();
      status.textContent = 'Encoding… ' + Math.round(p * 100) + '%';
    });

    try {
      gif.render();
    } catch (err) {
      window.clearInterval(watchdog);
      status.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
    }
  }

  function syncChamberStepLabels() {
    el('chamberVal').textContent = '(' + nCh + ')';
    el('stepVal').textContent = '(' + nSteps + ')';
  }

  function syncRuntime() {
    const frameMs = +el('frameMs').value || 120;
    const seq = buildFrameSequence();
    const totalMs = seq.length * frameMs;
    const secs = totalMs / 1000;
    el('runtime').textContent = seq.length + ' frames • ' + secs.toFixed(secs >= 10 ? 1 : 2) + ' s per cycle';
  }

  function syncTiltVal() {
    const t = el('pillTilt');
    if (!t || !el('tiltVal')) return;
    el('tiltVal').textContent = '(' + t.value + ')';
  }

  function syncEasingUi() {
    const smooth = el('smooth') ? el('smooth').checked : true;
    const row = el('easingRow');
    if (row) row.style.display = smooth ? 'block' : 'none';
  }

  function applyStylePreset(name) {
    const preset = name || 'balanced';
    const map = {
      compact:  { indicatorH: 0.66, indicatorW: 0.26, spacing: 0.22 },
      balanced: { indicatorH: 0.68, indicatorW: 0.28, spacing: 0.38 },
      airy:     { indicatorH: 0.70, indicatorW: 0.27, spacing: 0.55 },
    };
    const v = map[preset];
    if (!v) return;
    if (el('indicatorH')) el('indicatorH').value = String(v.indicatorH);
    if (el('indicatorW')) el('indicatorW').value = String(v.indicatorW);
    if (el('spacing')) el('spacing').value = String(v.spacing);
  }

  function syncStyleUi() {
    const preset = el('stylePreset') ? el('stylePreset').value : 'balanced';
    const block = el('customStyle');
    if (block) block.style.display = preset === 'custom' ? 'block' : 'none';
  }

  function syncBgRow() {
    const transparent = el('transparent').checked;
    const row = el('bgColorRow');
    if (row) row.style.display = transparent ? 'none' : 'block';
  }

  el('chambers').addEventListener('input', () => {
    const v = +el('chambers').value;
    if (v === nCh) return;
    nCh = v;
    initGrid();
    syncChamberStepLabels();
    renderTimeline();
    drawPreview(0);
    syncRuntime();
  });

  el('steps').addEventListener('input', () => {
    const v = +el('steps').value;
    if (v === nSteps) return;
    nSteps = v;
    initGrid();
    syncChamberStepLabels();
    renderTimeline();
    drawPreview(0);
    syncRuntime();
  });

  document.querySelectorAll('[data-preset]').forEach((btn) => {
    btn.addEventListener('click', () => applyPreset(btn.getAttribute('data-preset')));
  });

  el('btnClear').addEventListener('click', () => {
    initGrid();
    renderTimeline();
    drawPreview(0);
    syncRuntime();
  });

  el('btnExport').addEventListener('click', exportGif);

  [
    'activeColor', 'inactiveColor',
    'pillShape', 'pillTilt',
    'bgColor', 'gifPad',
    'frameMs', 'smooth', 'easing', 'transparent', 'loopMode',
    'aspect', 'outW', 'exportQuality',
  ].forEach((id) => {
    if (!el(id)) return;
    el(id).addEventListener('input', () => {
      if (id === 'outW' || id === 'aspect') {
        syncOutputHeight();
        syncPreviewSize();
      }
      if (id === 'pillTilt') syncTiltVal();
      if (id === 'transparent') syncBgRow();
      if (id === 'frameMs' || id === 'loopMode') syncRuntime();
      drawPreview(previewStep);
    });
    el(id).addEventListener('change', () => {
      if (id === 'outW' || id === 'aspect') {
        syncOutputHeight();
        syncPreviewSize();
      }
      if (id === 'pillTilt') syncTiltVal();
      if (id === 'transparent') syncBgRow();
      if (id === 'frameMs' || id === 'loopMode') syncRuntime();
      drawPreview(previewStep);
    });
  });

  ['indicatorH', 'indicatorW', 'spacing'].forEach((id) => {
    if (!el(id)) return;
    el(id).addEventListener('input', () => drawPreview(previewStep));
    el(id).addEventListener('change', () => drawPreview(previewStep));
  });

  if (el('stylePreset')) {
    el('stylePreset').addEventListener('input', () => {
      const v = el('stylePreset').value;
      if (v !== 'custom') applyStylePreset(v);
      syncStyleUi();
      drawPreview(previewStep);
    });
  }

  initGrid();
  applyPreset('sequential');
  syncChamberStepLabels();
  syncOutputHeight();
  syncPreviewSize();
  syncRuntime();
  syncTiltVal();
  applyStylePreset('balanced');
  syncStyleUi();
  syncEasingUi();
  syncBgRow();
  requestAnimationFrame(tick);
})();
  </script>
</body>
</html>
